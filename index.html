  function setKorrektur(val){setProdStatus(function(p){var next=Object.assign({},p);var cls2=Object.assign({},p[cls.id]);cls2[selProd]=Object.assign({},st,{korrekturBy:val});next[cls.id]=cls2;return next;});}

        }

                  {done?"✓":current?step.icon:<span style={{fontSize:14,opacity:.4}}>{step.icon}</span>}
                </div>
                {i<flow.length-1&&<div style={{width:2,height:18,background:done?GREEN:BRD,margin:"3px 0"}}/>}
              </div>
              <div style={{flex:1,paddingTop:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:done||current?700:400,color:done?GREEN:current?TXT:MTD}}>{step.label}</span>
                  {current&&<Tag c={GOLD} bg={GOLDBG} small>Aktuel</Tag>}
                  {done&&<Tag c={GREEN} bg={GBGN} small>Udført</Tag>}
                </div>
                {step.note&&<div style={{fontSize:11,color:MTD,marginBottom:3}}>{step.note}</div>}
                {step.key==="korrektur"&&current&&canEdit&&(
                  <div style={{display:"flex",gap:6,marginTop:4}}>
                    {["Skole","Elever","Begge"].map(function(opt){return <button key={opt} onClick={function(){setKorrektur(opt);}} style={{padding:"3px 10px",borderRadius:4,border:"1px solid "+(st.korrekturBy===opt?NAVY:BRD),background:st.korrekturBy===opt?NAVY:"transparent",color:st.korrekturBy===opt?"#fff":MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{opt}</button>;})
                    }

              </div>
            </div>
          );
        })}
        {canEdit&&st.step>0&&<button onClick={function(){setStep(Math.max(0,st.step-1));}} style={{fontSize:11,color:MTD,background:"transparent",border:"1px solid "+BRD,borderRadius:4,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",marginTop:6}}>← Trin tilbage</button>}
      </div>

        <div style={{fontSize:12,color:MTD}}>Trin {st.step}/{flow.length} · {Math.round(st.step/flow.length*100)}%</div>

      </div>
    </Modal>

  var sr=useState(item?item.rules:[]);var rules=sr[0];var setRules=sr[1];

  function addRule(){setRules(function(p){return p.concat([{id:nid.current++,trigger:"7 dage før",action:""}]);});}

          <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:10}}>Automatiske regler</div>
          {rules.map(function(r){return(
            <div key={r.id} style={{display:"grid",gridTemplateColumns:"160px 1fr 32px",gap:8,marginBottom:8,alignItems:"start"}}>
              <select value={r.trigger} onChange={function(e){upRule(r.id,"trigger",e.target.value);}} style={{padding:"8px 10px",borderRadius:5,border:"1px solid "+BRD,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",background:SFC}}>
                {TRIGGERS.map(function(t){return <option key={t} value={t}>{t}</option>;})}</select>

              <button onClick={function(){delRule(r.id);}} style={{padding:"8px",borderRadius:5,border:"1px solid "+BRD,background:"transparent",color:MTD,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
            </div>
          );})
          }
          <button onClick={addRule} style={{padding:"6px 14px",borderRadius:5,border:"1.5px dashed "+BRD,background:"transparent",color:MTD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Tilføj regel</button>

function Skoler({user,schools,setSchools,assignments,pipeline,setPipeline,events,setEvents,prodStatus,setProdStatus,elever,setElever,templates,opgaver,setOpgaver}){
  var st=useState("skoler");var tab=st[0];var setTab=st[1];
  var ss=useState(null);var sel=ss[0];var setSel=ss[1];
  var so=useState(null);var openCoh=so[0];var setOpenCoh=so[1];
  var sa=useState(false);var showArch=sa[0];var setShowArch=sa[1];
  var si=useState(null);var invCtx=si[0];var setInvCtx=si[1];
  var sne=useState(false);var noteEdit=sne[0];var setNoteEdit=sne[1];
  var snv=useState("");var noteVal=snv[0];var setNoteVal=snv[1];
  var sdet=useState(false);var detaljer=sdet[0];var setDetaljer=sdet[1];
  var sny=useState(false);var nyAargang=sny[0];var setNyAargang=sny[1];
  var spm=useState(null);var prodModal=spm[0];var setProdModal=spm[1];
  var sem=useState(null);var elevModal=sem[0];var setElevModal=sem[1];
  var shc=useState(null);var histCls=shc[0];var setHistCls=shc[1];
  var ssf=useState(null);var saelgerFilter=ssf[0];var setSaelgerFilter=ssf[1];
  var spf=useState(null);var pipeFilter=spf[0];var setPipeFilter=spf[1];
  var spm2=useState(false);var pipeModal=spm2[0];var setPipeModal=spm2[1];
  var spe=useState(null);var pipeEdit=spe[0];var setPipeEdit=spe[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];
  var scv=useState("liste");var calView=scv[0];var setCalView=scv[1];
  var snsk=useState(false);var nySkole=snsk[0];var setNySkole=snsk[1];
  var snkl=useState(null);var nyKlasse=snkl[0];var setNyKlasse=snkl[1]; // cohort for new class
  var srepr=useState(null);var reprDetalje=srepr[0];var setReprDetalje=srepr[1]; // {repr,slot,school,cohort,cls}
  var sop=useState(false);var opgaveModal=sop[0];var setOpgaveModal=sop[1];

  var canEdit=["admin","internsalg"].includes(user.role);
  var isAdmin=user.role==="admin";
  var canPipeline=["admin","internsalg","saelger"].includes(user.role);
  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null);},2200);}

  var mySchoolIds=user.role==="saelger"?(assignments?Object.keys(assignments).filter(function(k){return (assignments[k]||[]).includes(user.id);}).map(Number):null):null;
  var filteredSchools=(mySchoolIds?schools.filter(function(s){return mySchoolIds.includes(s.id);}):schools).filter(function(s){return !saelgerFilter||(assignments[s.id]||[]).includes(saelgerFilter);});
  var school=sel?schools.find(function(s){return s.id===sel;}):null;
  var cohs=school?(showArch?school.cohorts:school.cohorts.filter(function(c){return c.status==="active";})):[];
  var calEvents=sel?events.filter(function(e){return e.schoolId===sel||e.schoolId===0;}):events;
  var myPipeline=user.role==="saelger"?pipeline.filter(function(p){return p.responsible===user.id;}):pipeline;
  var filtPipeline=pipeFilter?myPipeline.filter(function(p){return p.responsible===pipeFilter;}):myPipeline;

  function updateSchool(sid,patch){setSchools(function(p){return p.map(function(s){return s.id===sid?Object.assign({},s,patch):s;});});}
  function saveNote(){updateSchool(school.id,{note:noteVal});setNoteEdit(false);showToast("Note gemt");}
  function addCohort(yr,classNames,prods){
    var maxId=Math.max.apply(null,schools.flatMap(function(s){return s.cohorts.map(function(c){return c.id;});}).concat([400]))+1;
    var maxClsId=Math.max.apply(null,schools.flatMap(function(s){return s.cohorts.flatMap(function(c){return c.classes.map(function(c2){return c2.id;});});}).concat([9000]))+1;
    var newCohort={id:maxId,year:yr,status:"active",classes:classNames.map(function(name,i){return {id:maxClsId+i,name:name,students:0,repr1:null,repr2:null,products:prods,orders:0,rev:0};})};
    updateSchool(school.id,{cohorts:[newCohort].concat(school.cohorts)});
    setOpenCoh(maxId);showToast("Ny årgang oprettet");
  }
  function addKlasseToCohort(cohortId,classData){
    updateSchool(school.id,{cohorts:school.cohorts.map(function(c){return c.id===cohortId?Object.assign({},c,{classes:c.classes.concat([classData])}):c;})});
    showToast("Klasse tilføjet");
  }
  function addSchool(data){setSchools(function(p){return p.concat([data]);});showToast("Skole oprettet");}
  function removeRepr(schoolId,cohortId,classId,slot){
    setSchools(function(p){return p.map(function(s){if(s.id!==schoolId)return s;return Object.assign({},s,{cohorts:s.cohorts.map(function(c){if(c.id!==cohortId)return c;return Object.assign({},c,{classes:c.classes.map(function(cl){if(cl.id!==classId)return cl;var patch={};patch["repr"+slot]=null;return Object.assign({},cl,patch);})})})})})}); 
    showToast("Repræsentant fjernet");
  }
  function savePipeline(data){
    if(pipeEdit){setPipeline(function(p){return p.map(function(x){return x.id===pipeEdit.id?Object.assign({},x,data):x;});});showToast("Emne opdateret");}
    else{setPipeline(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Emne oprettet");}
    setPipeModal(false);setPipeEdit(null);
  }
  function delPipeline(id){setPipeline(function(p){return p.filter(function(x){return x.id!==id;});});showToast("Emne slettet");}
  function addOpgave(data){setOpgaver(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Opgave oprettet");}

  var TABS_ITEMS=[
    {key:"skoler",label:"🏫 Skoler"},
    {key:"kalender",label:"▦ Kalender"+(sel&&school?" · "+school.name.split(" ")[0]:"")},
  ].concat(canPipeline?[{key:"pipeline",label:"🎯 Pipeline ("+filtPipeline.length+")"}]:[]);

  function getHistory(cls){return school?school.cohorts.map(function(co){var m=co.classes.find(function(c){return c.name===cls.name;});return m?Object.assign({year:co.year,status:co.status},m):null;}).filter(Boolean).sort(function(a,b){return b.year-a.year;}).slice(1):[];}

  var today=new Date("2026-03-10");
  function daysTo(dateStr){if(!dateStr)return 999;var d=new Date(dateStr);return Math.ceil((d-today)/(1000*60*60*24));}

  var PCOL={"Studenterhue":{c:NAVY,bg:"#E8ECF2"},"Blåbog":{c:GREEN,bg:GBGN},"Studieturstøj":{c:PURP,bg:PURPBG},"Studenterkørsel":{c:GOLD,bg:GOLDBG}};

  return(
    <div style={{padding:"28px 28px 40px",maxWidth:1100,margin:"0 auto"}}>
      {toast&&<Toast msg={toast}/>}
      {invCtx&&<InviteModal ctx={invCtx} onClose={function(){setInvCtx(null);}}/>}
      {nyAargang&&school&&<NyAargangModal school={school} onSave={addCohort} onClose={function(){setNyAargang(false);}}/>}
      {nySkole&&<NySkoleModal onSave={addSchool} onClose={function(){setNySkole(false);}}/>}
      {nyKlasse&&school&&<NyKlasseModal school={school} cohort={nyKlasse} onSave={function(d){addKlasseToCohort(nyKlasse.id,d);}} onClose={function(){setNyKlasse(null);}}/>}

// ─── TRADITIONER ─────────────────────────────────────────────────────────────
function Traditioner({user,schools,setSchools}){
  var ss=useState(null);var sel=ss[0];var setSel=ss[1];
  var se=useState(false);var editing=se[0];var setEditing=se[1];
  var st=useState(null);var draft=st[0];var setDraft=st[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];

  var canEdit=["admin","internsalg","saelger"].includes(user.role);
  var school=sel?schools.find(function(s){return s.id===sel;}):null;
  var trad=school?(school.trad||defaultTrad()):(draft||defaultTrad());

  function showToast(m){setToast(m);setTimeout(function(){setToast(null);},2200);}
  function startEdit(){setDraft(JSON.parse(JSON.stringify(trad)));setEditing(true);}
  function cancelEdit(){setDraft(null);setEditing(false);}
  function saveTrad(){
    setSchools(function(p){return p.map(function(s){return s.id===sel?Object.assign({},s,{trad:draft}):s;});});
    setDraft(null);setEditing(false);showToast("Tradition gemt");
  }
  var t=editing?draft:trad;
  function upT(path,val){
    if(!editing)return;
    setDraft(function(prev){
      var d=JSON.parse(JSON.stringify(prev));
      var parts=path.split(".");
      var obj=d;
      for(var i=0;i<parts.length-1;i++)obj=obj[parts[i]];
      obj[parts[parts.length-1]]=val;
      return d;
    });
  }

  var PROD_SECTIONS=[
    {key:"hue",label:"🎓 Studenterhue",color:NAVY,bg:"#E8ECF2",fields:[
      {label:"Tidspunkt for opmåling",path:"hue.opmaalingTid",placeholder:"fx Marts"},
      {label:"Betalingsfrist tradition",path:"hue.betalingsFrist",placeholder:"fx 10 dage efter opmåling"},
      {label:"Typisk leveringsmåned",path:"hue.leveringsMaaned",placeholder:"fx Juni"},
    ]},

// ─── SAG CARD (extracted to allow hooks per sag) ─────────────────────────────
function SagCard({sag,schools,isInternal,onUpdateStatus,onUpdateAssign,onUpdateNote,onAddReply}){
  var so=useState(false);var openSag=so[0];var setOpenSag=so[1];
  var sr=useState("");var replyT=sr[0];var setReplyT=sr[1];
  var sn=useState(sag.internalNote||"");var inNote=sn[0];var setInNote=sn[1];
  var sc=SAG_COLORS[sag.status];
  var school=schools.find(function(s){return s.id===sag.schoolId;});
  return(
    <Card noPad style={{marginBottom:10}}>
      <div onClick={function(){setOpenSag(!openSag);}} style={{padding:"13px 18px",display:"flex",gap:12,alignItems:"flex-start",cursor:"pointer"}}>
        <Ini t={sag.ini} s={34}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontSize:14,fontWeight:700,color:TXT}}>{sag.title}</span>
            <Tag c={sc.c} bg={sc.bg} small>{sag.status}</Tag>
            <Tag c={GOLD} bg={GOLDBG} small>{sag.category}</Tag>
          </div>
          <div style={{fontSize:12,color:MTD}}>{sag.from} · {school?school.name:""} · {sag.date}</div>
        </div>
        <span style={{color:MTD,fontSize:12,flexShrink:0}}>{openSag?"▲":"▼"}</span>
      </div>
      {openSag&&<div>
        <div style={{padding:"12px 18px",borderTop:"1px solid "+BRD}}><div style={{fontSize:13,color:TXT,lineHeight:1.65}}>{sag.body}</div></div>
        {sag.replies.length>0&&<div style={{padding:"10px 18px",background:"#F8F9FC",borderTop:"1px solid "+BRD}}>
          {sag.replies.map(function(r,i){return <div key={i} style={{display:"flex",gap:10,marginBottom:i<sag.replies.length-1?8:0}}><Ini t={r.ini} s={26}/><div><span style={{fontSize:12,fontWeight:600,color:TXT}}>{r.author}</span><div style={{fontSize:13,color:TXT,marginTop:1,lineHeight:1.55}}>{r.text}</div></div></div>;})}
        </div>}
        {isInternal&&<div style={{padding:"12px 18px",borderTop:"1px solid "+BRD,background:"#F8F6F2"}}>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginRight:4}}>Status:</span>
            {SAG_STATUSES.map(function(s){var c=SAG_COLORS[s];return <button key={s} onClick={function(){onUpdateStatus(sag.id,s);}} style={{padding:"3px 10px",borderRadius:4,border:"1px solid "+(sag.status===s?c.c:BRD),background:sag.status===s?c.bg:"transparent",color:sag.status===s?c.c:MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>;})}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7}}>Tildel:</span>
            {ALL_STAFF.map(function(s){return <button key={s.id} onClick={function(){onUpdateAssign(sag.id,s.id);}} style={{display:"flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:4,border:"1px solid "+(sag.assignedTo===s.id?NAVY:BRD),background:sag.assignedTo===s.id?NAVY:"transparent",color:sag.assignedTo===s.id?"#fff":MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}><Ini t={s.ini} s={16} bg={sag.assignedTo===s.id?"rgba(255,255,255,.2)":NAVY}/>{s.name.split(" ")[0]}</button>;})}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:5}}>Intern note</div>
            <textarea value={inNote} onChange={function(e){setInNote(e.target.value);}} onBlur={function(){onUpdateNote(sag.id,inNote);}} rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:5,border:"1px solid "+BRD,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",resize:"vertical",boxSizing:"border-box",lineHeight:1.65}}/>
          </div>
        </div>}
        <div style={{padding:"8px 18px",borderTop:"1px solid "+BRD,display:"flex",gap:8}}>
          <input value={replyT} onChange={function(e){setReplyT(e.target.value);}} placeholder="Skriv svar…" style={{flex:1,padding:"7px 12px",borderRadius:5,border:"1px solid "+BRD,fontSize:13,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none"}}/>
          <button onClick={function(){if(replyT.trim()){onAddReply(sag.id,replyT);setReplyT("");}}} style={{padding:"7px 14px",borderRadius:5,border:"none",background:NAVY,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Send</button>
        </div>
      </div>}
    </Card>
  );
}

// ─── KOMMUNIKATION ──────────────────────────────────────────────────────────
function Kommunikation({user,schools,assignments,opgaver,setOpgaver,sager,setSager}){
  var st=useState("forum");var tab=st[0];var setTab=st[1];
  var sp=useState(POSTS_INIT);var posts=sp[0];var setPosts=sp[1];
  var sm=useState(MSGS_INIT);var msgs=sm[0];var setMsgs=sm[1];
  var sr=useState(null);var replyTo=sr[0];var setReplyTo=sr[1];
  var sri=useState("");var replyText=sri[0];var setReplyText=sri[1];
  var snm=useState("");var newMsg=snm[0];var setNewMsg=snm[1];
  var sny=useState(false);var nySag=sny[0];var setNySag=sny[1];
  var sno=useState(false);var nyOpgave=sno[0];var setNyOpgave=sno[1];
  var ssf=useState(null);var sagFilter=ssf[0];var setSagFilter=ssf[1];
  var sop=useState(null);var selOpgave=sop[0];var setSelOpgave=sop[1];

  var isInternal=["admin","saelger","internsalg"].includes(user.role);
  var visibleSager=user.role==="repr"?sager.filter(function(s){return s.schoolId===user.schoolId;}):sagFilter?sager.filter(function(s){return s.status===sagFilter;}):sager;
  var myOpgaver=isInternal?(user.role==="admin"?opgaver:opgaver.filter(function(o){return o.to===user.id||(ALL_STAFF.find(function(s){return s.id===user.id;})&&o.from===user.id);})):[];
  var openOpgaver=myOpgaver.filter(function(o){return o.status!=="Udført";}).length;

  function addPost(p){setPosts(function(prev){return [Object.assign({id:Date.now(),ini:user.ini,author:user.name,schoolId:user.schoolId||0,staffId:user.id||0,unread:0,date:"nu",pinned:false,replies:[]},p)].concat(prev);});}
  function addReply(postId,text){setPosts(function(p){return p.map(function(post){return post.id===postId?Object.assign({},post,{replies:post.replies.concat([{ini:user.ini,author:user.name,text:text,date:"nu"}])}):post;});});setReplyTo(null);setReplyText("");}
  function addSag(data){setSager(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});}
  function updateSagStatus(id,status){setSager(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{status:status}):s;});});}
  function updateSagAssign(id,to){setSager(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{assignedTo:to}):s;});});}
  function addSagReply(sagId,text){setSager(function(p){return p.map(function(s){return s.id===sagId?Object.assign({},s,{replies:s.replies.concat([{ini:user.ini,author:user.name,text:text,date:"nu"}])}):s;});});}
  function updateSagNote(id,note){setSager(function(p){return p.map(function(s){return s.id===id?Object.assign({},s,{internalNote:note}):s;});});}
  function updateOpgaveStatus(id,status){setOpgaver(function(p){return p.map(function(o){return o.id===id?Object.assign({},o,{status:status}):o;});});}
  function addOpgave(data){setOpgaver(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});}

  var TABS=[{key:"forum",label:"📌 Forum"},{key:"sager",label:"📨 Henvendelser"+(visibleSager.filter(function(s){return s.status==="Ny";}).length>0?" ("+visibleSager.filter(function(s){return s.status==="Ny";}).length+")":"")},{key:"chat",label:"💬 Chat"}];
  if(isInternal)TABS.push({key:"opgaver",label:"📋 Opgaver"+(openOpgaver>0?" ("+openOpgaver+")":"")});

  return(
    <div style={{padding:"28px 28px 40px",maxWidth:860,margin:"0 auto"}}>
      {nySag&&<NySagModal schools={schools} userRole={user.role} userName={user.name} userIni={user.ini} onSave={addSag} onClose={function(){setNySag(false);}} reprSchoolId={user.schoolId}/>}
      {nyOpgave&&<OpgaveModal schools={schools} onSave={addOpgave} onClose={function(){setNyOpgave(false);}}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,paddingBottom:14,borderBottom:"1px solid "+BRD}}>
        <h1 style={{fontSize:22,fontWeight:700,color:TXT,margin:0,fontFamily:"'Playfair Display',serif"}}>Kommunikation</h1>
        <div style={{display:"flex",gap:8}}>

function Statistik({schools}){
  var allCls=schools.flatMap(function(s){return s.cohorts.filter(function(c){return c.status==="active";}).flatMap(function(c){return c.classes;});});
  var totalRev=allCls.reduce(function(a,c){return a+c.rev;},0);
  var totalOrd=allCls.reduce(function(a,c){return a+c.orders;},0);
  return(
    <div style={{padding:"28px 28px 40px",maxWidth:900,margin:"0 auto"}}>
      <h1 style={{fontSize:22,fontWeight:700,color:TXT,margin:"0 0 20px",fontFamily:"'Playfair Display',serif"}}>Statistik</h1>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        <KPI label="Total omsætning" value={kr(totalRev)} delta={+pct(totalRev,MG.ly.rev)} icon="kr"/>
        <KPI label="Ordrer" value={totalOrd} delta={+pct(totalOrd,MG.ly.orders)} icon="📦"/>
        <KPI label="Aktive skoler" value={schools.length} icon="🏫"/>
        <KPI label="Gns. ordre" value={totalOrd>0?kr(Math.round(totalRev/totalOrd)):"—"} icon="↗"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:16,marginBottom:16}}>
        <Card><STitle sub="Mørk = 2026 · Lys = 2025">Månedlig omsætning</STitle><BarChart data={MG.mo}/></Card>
        <Card><STitle>Pr. skole</STitle>{schools.map(function(s){var rev=s.cohorts.filter(function(c){return c.status==="active";}).flatMap(function(c){return c.classes;}).reduce(function(a,c){return a+c.rev;},0);return <div key={s.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:TXT}}>{s.name.split(" ")[0]}</span><span style={{fontSize:13,fontWeight:700,color:GOLD}}>{kr(rev)}</span></div><Prog val={rev} max={250000}/></div>;})}</Card>
      </div>
    </div>
  );
}

function Indstillinger({schools,assignments,setAssignments,templates,setTemplates,opgaver,setOpgaver}){
  var st=useState("tildeling");var tab=st[0];var setTab=st[1];
  var ss=useState(null);var skabelonEdit=ss[0];var setSkabelonEdit=ss[1];
  var sn=useState(false);var nySkabelon=sn[0];var setNySkabelon=sn[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];
  var sno=useState(false);var nyOpgave=sno[0];var setNyOpgave=sno[1];

  function showToast(m){setToast(m);setTimeout(function(){setToast(null);},2200);}
  function toggleAssign(schoolId,staffId){setAssignments(function(p){var cur=p[schoolId]||[];var next=cur.includes(staffId)?cur.filter(function(id){return id!==staffId;}):[].concat(cur,[staffId]);return Object.assign({},p,Object.fromEntries([[schoolId,next]]));});}
  function saveSkabelon(data){
    if(skabelonEdit){setTemplates(function(p){return p.map(function(t){return t.id===skabelonEdit.id?Object.assign({},t,data):t;});});showToast("Skabelon opdateret");}
    else{setTemplates(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Skabelon oprettet");}
    setSkabelonEdit(null);setNySkabelon(false);
  }
  function delSkabelon(id){setTemplates(function(p){return p.filter(function(t){return t.id!==id;});});showToast("Skabelon slettet");}
  function addOpgave(data){setOpgaver(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Opgave oprettet");}

  var saelgere=ALL_STAFF.filter(function(s){return s.role==="saelger"||s.role==="internsalg";});

                <Ini t={s.ini} s={44}/>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:"'Playfair Display',serif"}}>{s.name}</div>
                  <div style={{fontSize:12,color:MTD,marginBottom:6}}>{RLBL[s.role]}</div>
                  {s.email&&<a href={"mailto:"+s.email} style={{display:"block",fontSize:12,color:NAVY,textDecoration:"none",marginBottom:2}}>✉️ {s.email}</a>}
                  {s.phone&&<a href={"tel:"+s.phone} style={{display:"block",fontSize:12,color:NAVY,textDecoration:"none"}}>📱 {s.phone}</a>}
                </div>
              </div>
              <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid "+BRD}}>
                <div style={{fontSize:11,color:MTD,fontWeight:600,marginBottom:6}}>Tildelte skoler</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {schools.filter(function(sc){return (assignments[sc.id]||[]).includes(s.id);}).map(function(sc){return <Tag key={sc.id} small c={NAVY} bg={"#E8ECF2"}>{sc.name.split(" ")[0]}</Tag>;})}
                  {schools.filter(function(sc){return (assignments[sc.id]||[]).includes(s.id);}).length===0&&<span style={{fontSize:12,color:MTD}}>Ingen tildelt</span>}
                </div>
              </div>
            </Card>
          );})}
        </div>
      </div>}
    </div>
  );
}

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function Login({onLogin}){
  return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:440,background:SFC,borderRadius:12,overflow:"hidden",boxShadow:"0 24px 80px rgba(21,32,53,.18)"}}>
        <div style={{background:NAVY,padding:"32px 36px",textAlign:"center"}}>
          <div style={{width:52,height:52,background:GOLD,borderRadius:10,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:14}}><span style={{color:"#fff",fontWeight:900,fontSize:26,fontFamily:"'Playfair Display',serif"}}>C</span></div>
          <div style={{color:"#fff",fontWeight:800,fontSize:22,fontFamily:"'Playfair Display',serif"}}>CLS<span style={{color:GOLD}}>+</span> Sales OS</div>
          <div style={{color:"rgba(255,255,255,.4)",fontSize:12,marginTop:6}}>C.L. Seifert · Kongelig Hofleverandør</div>
        </div>
        <div style={{padding:"28px 36px"}}>
          <div style={{fontSize:14,fontWeight:600,color:TXT,marginBottom:16,textAlign:"center"}}>Log ind som</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {Object.entries(USERS).map(function(entry){var k=entry[0];var v=entry[1];return(
              <button key={k} onClick={function(){onLogin(v);}}
                style={{padding:"14px 12px",borderRadius:8,border:"1.5px solid "+BRD,background:SFC,cursor:"pointer",textAlign:"center",fontFamily:"'DM Sans',sans-serif",transition:"all .15s"}}
                onMouseEnter={function(e){e.currentTarget.style.borderColor=NAVY;e.currentTarget.style.background="#F0EEE8";}}
                onMouseLeave={function(e){e.currentTarget.style.borderColor=BRD;e.currentTarget.style.background=SFC;}}>
                <Ini t={v.ini} s={34} bg={k==="repr"?GREEN:NAVY}/>
                <div style={{fontSize:13,fontWeight:700,color:TXT,marginTop:8,fontFamily:"'Playfair Display',serif"}}>{v.name.split(" ")[0]}</div>
                <div style={{fontSize:11,color:MTD,marginTop:2}}>{RLBL[v.role]}</div>
              </button>
            );})}
          </div>
          <div style={{marginTop:20,padding:"12px 16px",background:"#F8F6F2",borderRadius:8,fontSize:12,color:MTD,textAlign:"center",lineHeight:1.7}}>Demo-login · Alle roller er tilgængelige for test</div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  var su=useState(null);var user=su[0];var setUser=su[1];
  var sp=useState("dashboard");var page=sp[0];var setPage=sp[1];
  var ss=useState(INIT_SCHOOLS);var schools=ss[0];var setSchools=ss[1];
  var se=useState(EVENTS_INIT);var events=se[0];var setEvents=se[1];
  var spl=useState(INIT_PIPELINE);var pipeline=spl[0];var setPipeline=spl[1];
  var sps=useState(MOCK_PROD_STATUS);var prodStatus=sps[0];var setProdStatus=sps[1];
  var sel=useState(MOCK_ELEVER);var elever=sel[0];var setElever=sel[1];
  var sas=useState({1:[2,3],2:[2,5],3:[3]});var assignments=sas[0];var setAssignments=sas[1];
  var stm=useState(INIT_TEMPLATES);var templates=stm[0];var setTemplates=stm[1];
  var ssa=useState(INIT_SAGER);var sager=ssa[0];var setSager=ssa[1];
  var sop=useState(INIT_OPGAVER);var opgaver=sop[0];var setOpgaver=sop[1];
  var sgsr=useState(false);var showSearch=sgsr[0];var setShowSearch=sgsr[1];

  useEffect(function(){
    function h(e){if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}}
    window.addEventListener("keydown",h);
    return function(){window.removeEventListener("keydown",h);};
  },[]);

  if(!user)return <Login onLogin={function(u){setUser(u);setPage("dashboard");}}/>;

  var notifCount=0;
  var sagCount=sager.filter(function(s){return s.status==="Ny";}).length;
  var opgCount=opgaver.filter(function(o){return o.status!=="Udført"&&(user.role==="admin"||o.to===user.id);}).length;

  function go(pg){setPage(pg);}

  var mainStyle={flex:1,minWidth:0,background:BG,overflowY:"auto",minHeight:"100vh"};

  return(
    <div style={{display:"flex",minHeight:"100vh",background:BG,fontFamily:"'DM Sans',sans-serif"}}>
      <link rel="preconnect" href="https://fonts.googleapis.com"/>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      {showSearch&&<GlobalSearch schools={schools} onNavigate={go} onClose={function(){setShowSearch(false);}}/>}
      <Sidebar user={user} page={page} go={go} logout={function(){setUser(null);}} notifCount={notifCount} sagCount={sagCount} opgaveCount={opgCount}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <Topbar page={page} user={user} onSearch={function(){setShowSearch(true);}} notifCount={notifCount} sagCount={sagCount}/>
        <div style={mainStyle}>
          {page==="dashboard"&&<Dashboard user={user} schools={schools} events={events} opgaver={opgaver}/>}
          {page==="skoler"&&<Skoler user={user} schools={schools} setSchools={setSchools} assignments={assignments} pipeline={pipeline} setPipeline={setPipeline} events={events} setEvents={setEvents} prodStatus={prodStatus} setProdStatus={setProdStatus} elever={elever} setElever={setElever} templates={templates} opgaver={opgaver} setOpgaver={setOpgaver}/>}
          {page==="traditioner"&&<Traditioner user={user} schools={schools} setSchools={setSchools}/>}
          {page==="kommunikation"&&<Kommunikation user={user} schools={schools} assignments={assignments} opgaver={opgaver} setOpgaver={setOpgaver} sager={sager} setSager={setSager}/>}
          {page==="statistik"&&<Statistik schools={schools}/>}
          {page==="indstillinger"&&<Indstillinger schools={schools} assignments={assignments} setAssignments={setAssignments} templates={templates} setTemplates={setTemplates} opgaver={opgaver} setOpgaver={setOpgaver}/>}
          {page==="minskole"&&<MinSkole user={user} schools={schools} events={events} elever={elever} setElever={setElever} prodStatus={prodStatus} setProdStatus={setProdStatus}/>}
          {page==="guides"&&<Guides/>}
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App, null));
  </script>
</body>
</html>
