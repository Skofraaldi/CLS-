  var sp=useState([]);var picked=sp[0];var setPicked=sp[1];

  /* MODE A — assign school to filters (shown inside SkoleInfoModal) */

    return(
      <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
        {(customFilters||[]).length===0&&<span style={{fontSize:12,color:MTD,fontStyle:"italic"}}>Ingen filtre oprettet endnu</span>}
        {(customFilters||[]).map(function(f){
          var inF=(f.schoolIds||[]).includes(schoolId);
          return <button key={f.id} onClick={function(){if(!canEdit)return;setCustomFilters(function(p){return p.map(function(ff){if(ff.id!==f.id)return ff;var ids=inF?(ff.schoolIds||[]).filter(function(i){return i!==schoolId;}):(ff.schoolIds||[]).concat([schoolId]);return Object.assign({},ff,{schoolIds:ids});});});}} style={{padding:"4px 12px",borderRadius:20,border:"1px solid "+(inF?GOLD:BRD),background:inF?GOLDBG:"transparent",color:inF?GOLD:MTD,fontSize:12,fontWeight:inF?700:400,cursor:canEdit?"pointer":"default",fontFamily:"inherit"}}>{f.label} {inF?"✓":""}</button>;

          <Ini t={s.ini} s={16} bg={sel?"rgba(255,255,255,.25)":NAVY}/>{s.name.split(" ")[0]}
        </button>

      {/* Custom filters */}
      {(customFilters||[]).map(function(f){var sel=active&&active.type==="custom"&&active.id===f.id;return(
        <div key={f.id} style={{display:"flex",alignItems:"center"}}>

          {setCustomFilters&&<button onClick={function(){setCustomFilters(function(p){return p.filter(function(ff){return ff.id!==f.id;});});if(active&&active.type==="custom"&&active.id===f.id)onChange(null);}} style={{padding:"4px 6px",borderRadius:"0 20px 20px 0",border:"1px solid "+(sel?GOLD:BRD),background:sel?GOLDBG:"transparent",color:sel?GOLD:MTD,fontSize:12,cursor:"pointer",fontFamily:"inherit",lineHeight:1}}>×</button>}
        </div>
      );})}

      {/* Add filter button */}
      {setCustomFilters&&!showAdd&&<button onClick={function(){setShowAdd(true);setPicked([]);setNewLabel("");}} style={{padding:"4px 10px",borderRadius:20,border:"1.5px dashed "+BRD,background:"transparent",color:MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>+ Nyt filter</button>}

              {schools.map(function(s){

function ElevStatusModal({school,cohort,cls,onClose,elever,setElever,userRole}){

  function upElev(id,v){setElever(function(p){var next=Object.assign({},p);next[cls.id]=p[cls.id].map(function(e){return e.id===id?Object.assign({},e,{betalt:v}):e;});return next;});}
  function delElev(id){setElever(function(p){var next=Object.assign({},p);next[cls.id]=p[cls.id].filter(function(e){return e.id!==id;});return next;});}
  function upName(id,v){setElever(function(p){var next=Object.assign({},p);next[cls.id]=p[cls.id].map(function(e){return e.id===id?Object.assign({},e,{name:v}):e;});return next;});}

            {clsElever.map(function(e){return(
              <tr key={e.id} style={{borderTop:"1px solid "+BRD,background:e.betalt?"#F8FCF9":SFC}}>
                <td style={{padding:"10px 18px"}}>
                  {canEdit

function ProduktionModal({school,cohort,cls,onClose,prodStatus,setProdStatus,userRole}){
  var sp=useState(cls.products[0]||"Studenterhue");var selProd=sp[0];var setSelProd=sp[1];
  var status=prodStatus[cls.id]||{};
  var st=status[selProd]||{step:0,notes:{},korrekturBy:"Elever"};
  var flow=PROD_FLOWS[selProd]||[];
  var canEdit=["admin","internsalg","saelger"].includes(userRole);
  function setStep(n){setProdStatus(function(p){var next=Object.assign({},p);var cls2=Object.assign({},p[cls.id]);cls2[selProd]=Object.assign({},st,{step:n});next[cls.id]=cls2;return next;});}
  function setNote(key,val){setProdStatus(function(p){var next=Object.assign({},p);var cls2=Object.assign({},p[cls.id]);var notes=Object.assign({},st.notes);notes[key]=val;cls2[selProd]=Object.assign({},st,{notes:notes});next[cls.id]=cls2;return next;});}
  function setKorrektur(val){setProdStatus(function(p){var next=Object.assign({},p);var cls2=Object.assign({},p[cls.id]);cls2[selProd]=Object.assign({},st,{korrekturBy:val});next[cls.id]=cls2;return next;});}
  return(
    <Modal onClose={onClose} wide>
      <div style={{background:NAVY,padding:"16px 22px",display:"flex",alignItems:"center",gap:14}}>

      </div>
      <div style={{display:"flex",gap:8,padding:"12px 20px",borderBottom:"1px solid "+BRD,flexWrap:"wrap"}}>
        {cls.products.map(function(p){return <button key={p} onClick={function(){setSelProd(p);}} style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(selProd===p?(PCOL[p]||{c:MTD}).c:BRD),background:selProd===p?(PCOL[p]||{bg:"#F0EDE8"}).bg:"transparent",color:selProd===p?(PCOL[p]||{c:MTD}).c:MTD,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{p}</button>;})
        }
      </div>
      <div style={{padding:"16px 22px",maxHeight:400,overflowY:"auto"}}>
        {flow.map(function(step,i){
          var done=i<st.step,current=i===st.step;
          return(
            <div key={step.key} style={{display:"flex",gap:14,marginBottom:10,alignItems:"flex-start"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:32,flexShrink:0}}>
                <div onClick={canEdit&&!done?function(){setStep(i+1);}:undefined}
                  style={{width:32,height:32,borderRadius:"50%",background:done?GREEN:current?GOLD:"#F0EDE8",border:"2px solid "+(done?GREEN:current?GOLD:BRD),display:"flex",alignItems:"center",justifyContent:"center",cursor:canEdit&&!done?"pointer":"default",fontSize:14}}>
                  {done?"✓":current?step.icon:<span style={{fontSize:14,opacity:.4}}>{step.icon}</span>}
                </div>
                {i<flow.length-1&&<div style={{width:2,height:18,background:done?GREEN:BRD,margin:"3px 0"}}/>}
              </div>
              <div style={{flex:1,paddingTop:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:done||current?700:400,color:done?GREEN:current?TXT:MTD}}>{step.label}</span>
                  {current&&<Tag c={GOLD} bg={GOLDBG} small>Aktuel</Tag>}
                  {done&&<Tag c={GREEN} bg={GBGN} small>Udført</Tag>}
                </div>
                {step.note&&<div style={{fontSize:11,color:MTD,marginBottom:3}}>{step.note}</div>}
                {step.key==="korrektur"&&current&&canEdit&&(
                  <div style={{display:"flex",gap:6,marginTop:4}}>
                    {["Skole","Elever","Begge"].map(function(opt){return <button key={opt} onClick={function(){setKorrektur(opt);}} style={{padding:"3px 10px",borderRadius:4,border:"1px solid "+(st.korrekturBy===opt?NAVY:BRD),background:st.korrekturBy===opt?NAVY:"transparent",color:st.korrekturBy===opt?"#fff":MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{opt}</button>;})
                    }
                  </div>
                )}
                {canEdit&&(done||current)&&<input value={st.notes[step.key]||""} onChange={function(e){setNote(step.key,e.target.value);}} placeholder="Note til dette trin…" style={{width:"100%",marginTop:5,padding:"5px 9px",borderRadius:4,border:"1px solid "+BRD,fontSize:12,fontFamily:"inherit",color:TXT,outline:"none",boxSizing:"border-box"}}/>}
              </div>
            </div>
          );
        })}
        {canEdit&&st.step>0&&<button onClick={function(){setStep(Math.max(0,st.step-1));}} style={{fontSize:11,color:MTD,background:"transparent",border:"1px solid "+BRD,borderRadius:4,padding:"4px 10px",cursor:"pointer",fontFamily:"inherit",marginTop:6}}>← Trin tilbage</button>}
      </div>
      <div style={{padding:"11px 22px",borderTop:"1px solid "+BRD,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,color:MTD}}>Trin {st.step}/{flow.length} · {Math.round(st.step/flow.length*100)}%</div>
        <button onClick={onClose} style={{padding:"7px 18px",borderRadius:5,border:"1px solid "+BRD,background:"transparent",color:MTD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Luk</button>
      </div>
    </Modal>
  );
}

          {fields.map(function(f){return(<div key={f.id} style={{background:"#F8F6F2",borderRadius:8,padding:12,marginBottom:10,position:"relative"}}>

          </div>);})}
          {canEdit&&fields.length>0&&<button onClick={addField} style={{width:"100%",padding:"8px",borderRadius:6,border:"1.5px dashed "+BRD,background:"transparent",color:MTD,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Tilføj tomt felt</button>}

//  COHORT DETAIL MODAL 
function CohortDetailModal({school,cohort,canEdit,onSave,onClose,inline,customKonkurrenter,modeskabeloner,konkurrentProfiler,modeProfiler}){
  var cd=cohort.contract||{type:"Tilbud sendt",approvedBy:"",status:"Tilbud sendt",gdprSigned:false,gdprDate:"",contractFile:""};
  var sc=useState(cd);var contract=sc[0];var setContract=sc[1];
  var sk=useState(cohort.konkurrenter||[]);var konk=sk[0];var setKonk=sk[1];
  var st=useState(cohort.trad||{hue:{aktiv:false,opmaalingTid:"",betalingsFrist:"",leveringsMaaned:"",ekstraNotes:""},stoej:{aktiv:false,afrejse:"",provetojSendt:false,provetojSendtTil:"",provetojSendtDato:"",proevetojNotes:"",ekstraNotes:""},blaabog:{aktiv:false,korrekturAnsvar:"Elever",typiskOplage:0,deadline:"",ekstraNotes:""},koersel:{aktiv:false,typiskAntal:0,ruteNotes:"",tidspunkt:"",ekstraNotes:""}});var trad=st[0];var setTrad=st[1];
  var stb=useState("kontrakt");var tab=stb[0];var setTab=stb[1];
  var smo=useState(cohort.moeder||[]);var moeder=smo[0];var setMoeder=smo[1];
  var smv=useState({dato:"",tidFra:"",tidTil:"",type:"",noter:""});var nytModeVal=smv[0];var setNytModeVal=smv[1];
  var smshow=useState(false);var visNytMode=smshow[0];var setVisNytMode=smshow[1];
  var smid=useRef(Date.now()+200);
  var nid=useRef(Date.now());
  var iS={width:"100%",padding:"9px 12px",borderRadius:5,border:"1px solid "+BRD,fontSize:13,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",boxSizing:"border-box"};
  var PROD_COMP=["Studenterhue","Blåbog","Studieturstøj","Studenterkørsel","Alt"];
  var AFREJSE=["Forår","Efterår","Vinter","Varierer"];
  var KOR_ANS=["Elever","Skole","Begge"];

  function upT(prod,field,val){setTrad(function(p){var cur=p[prod]||{};return Object.assign({},p,(function(){var _o={};_o[prod]=Object.assign({},cur,(function(){var _o={};_o[field]=val;return _o;})());return _o;})())});}
  function addKonk(){setKonk(function(p){return p.concat([{id:nid.current++,navn:"",produkt:"Studenterhue",note:""}]);});}
  function upK(id,f,v){setKonk(function(p){return p.map(function(k){return k.id===id?Object.assign({},k,(function(){var _o={};_o[f]=v;return _o;})()):k;});});}
  function delK(id){setKonk(function(p){return p.filter(function(k){return k.id!==id;});});}
  function save(){onSave({contract:contract,konkurrenter:konk,trad:trad,moeder:moeder});onClose();}

  // Get repr names for contract approvedBy dropdown
  var reprOptions=[{value:"",label:"— Ikke valgt"}];
  (cohort.classes||[]).forEach(function(cl){
    if(cl.repr1&&cl.repr1.name)reprOptions.push({value:cl.repr1.name,label:cl.repr1.name+" ("+cl.name+" repr.1)"});
    if(cl.repr2&&cl.repr2.name)reprOptions.push({value:cl.repr2.name,label:cl.repr2.name+" ("+cl.name+" repr.2)"});
  });
  var uniqueReprs=reprOptions.filter(function(o,i){return reprOptions.findIndex(function(x){return x.value===o.value;})===i;});

  var CONTRACT_STATUS=["Tilbud sendt","Tilbud godkendt"];
  var cStatus=contract.status||"Tilbud sendt";
  var cCol=cStatus==="Tilbud godkendt"?{c:GREEN,bg:GBGN}:{c:GOLD,bg:GOLDBG};
  var TABS=[{key:"kontrakt",label:"📝 Kontrakt"},{key:"konkurrenter",label:"⚔️ Konkurrenter"},{key:"moeder",label:"📅 Møder"},{key:"traditioner",label:"★ Traditioner"}];

  var inlineStyle={background:SFC,borderRadius:12,border:"1px solid "+BRD,overflow:"hidden"};
  var Wrap=inline?function(p){return <div style={inlineStyle}>{p.children}</div>;}:function(p){return <Modal onClose={onClose} wide>{p.children}</Modal>;};
  return(
    <Wrap>
      <div style={{padding:"14px 22px",borderBottom:"1px solid "+BRD}}>
        <div style={{fontSize:16,fontWeight:700,color:TXT,fontFamily:"'Playfair Display',serif"}}>Årgang {cohort.year} · {school.name}</div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginTop:6}}>
          <Tag c={cCol.c} bg={cCol.bg}>{cStatus}</Tag>
          {contract.gdprSigned&&<Tag c={GREEN} bg={GBGN} small>✓ GDPR</Tag>}
          {konk.length>0&&<Tag c={RED} bg={REDBG} small>⚔️ {konk.length} konkurrent{konk.length>1?"er":""}</Tag>}
        </div>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid "+BRD}}>
        {TABS.map(function(t){return <button key={t.key} onClick={function(){setTab(t.key);}} style={{flex:1,padding:"9px",border:"none",background:tab===t.key?"#F8F6F2":"transparent",color:tab===t.key?NAVY:MTD,fontSize:12,fontWeight:tab===t.key?700:400,cursor:"pointer",fontFamily:"inherit",borderBottom:tab===t.key?"2px solid "+NAVY:"2px solid transparent"}}>{t.label}</button>;})}
      </div>
      <div style={{padding:"14px 22px",maxHeight:440,overflowY:"auto"}}>

        {/* KONTRAKT */}
        {tab==="kontrakt"&&<div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:8}}>Status</div>
            <div style={{display:"flex",gap:8}}>
              {CONTRACT_STATUS.map(function(s){var col=s==="Tilbud godkendt"?{c:GREEN,bg:GBGN}:{c:GOLD,bg:GOLDBG};var act=cStatus===s;return(
                <button key={s} onClick={function(){if(canEdit)setContract(function(p){return Object.assign({},p,{status:s,type:s});});}} style={{flex:1,padding:"12px",borderRadius:8,border:"2px solid "+(act?col.c:BRD),background:act?col.bg:"transparent",cursor:canEdit?"pointer":"default",fontFamily:"inherit"}}>
                  <div style={{fontSize:16,marginBottom:4}}>{s==="Tilbud godkendt"?"✅":"📤"}</div>
                  <div style={{fontSize:13,fontWeight:700,color:act?col.c:TXT}}>{s}</div>
                </button>
              );})}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:5}}>Godkendt af (repr.)</div>
            {canEdit?(
              <select value={contract.approvedBy||""} onChange={function(e){setContract(function(p){return Object.assign({},p,{approvedBy:e.target.value});});}} style={iS}>
                {uniqueReprs.map(function(o){return <option key={o.value} value={o.value}>{o.label}</option>;})}
              </select>
            ):<div style={{fontSize:13,color:TXT,background:"#F8F6F2",borderRadius:5,padding:"9px 12px"}}>{contract.approvedBy||"—"}</div>}
            {canEdit&&uniqueReprs.length===1&&<div style={{fontSize:11,color:MTD,marginTop:4,fontStyle:"italic"}}>Ingen repr. oprettet endnu</div>}
          </div>
          <div style={{background:contract.gdprSigned?GBGN:REDBG,border:"1px solid "+(contract.gdprSigned?GREEN+"50":RED+"50"),borderRadius:8,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:contract.gdprSigned?GREEN:RED,marginBottom:8}}>🔒 GDPR · Databehandleraftale</div>
            {canEdit?<div style={{display:"flex",alignItems:"center",gap:10}}>

              <label style={{fontSize:13,color:TXT,cursor:"pointer",fontWeight:600}}>Databehandleraftale underskrevet</label>
            </div>:<Tag c={contract.gdprSigned?GREEN:RED} bg={contract.gdprSigned?GBGN:REDBG}>{contract.gdprSigned?"Underskrevet ✓":"Ikke underskrevet"}</Tag>}
            {contract.gdprDate&&<div style={{fontSize:12,color:MTD,marginTop:6}}>Underskrevet: {contract.gdprDate}</div>}
          </div>
          {canEdit&&!contract.contractFile&&<div style={{border:"2px dashed "+BRD,borderRadius:6,padding:"16px",textAlign:"center",cursor:"pointer"}} onClick={function(){setContract(function(p){return Object.assign({},p,{contractFile:"kontrakt_"+school.name.toLowerCase().replace(/\s+/g,"_")+"_"+cohort.year+".pdf"});});}}>
            <div style={{fontSize:24,marginBottom:6}}>📤</div>
            <div style={{fontSize:13,fontWeight:600,color:NAVY}}>Upload kontrakt</div>
          </div>}
          {contract.contractFile&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F8F6F2",borderRadius:8}}>
            <span style={{fontSize:20}}>📄</span>
            <div style={{flex:1,fontSize:13,fontWeight:600,color:NAVY}}>{contract.contractFile}</div>
            {canEdit&&<button onClick={function(){setContract(function(p){return Object.assign({},p,{contractFile:""});});}} style={{padding:"4px 10px",borderRadius:4,border:"1px solid "+BRD,background:"transparent",color:RED,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Fjern</button>}
          </div>}
        </div>}

        {/* KONKURRENTER */}
        {tab==="konkurrenter"&&<div>

          {konk.length===0&&<div style={{padding:"20px",textAlign:"center",color:MTD,fontSize:13,background:"#F8F6F2",borderRadius:8}}>Ingen konkurrenter for denne årgang</div>}
          {konk.map(function(k){return(
            <div key={k.id} style={{background:"#F8F6F2",borderRadius:8,padding:12,marginBottom:10,position:"relative"}}>
              {canEdit&&<button onClick={function(){delK(k.id);}} style={{position:"absolute",top:8,right:8,background:"none",border:"none",color:MTD,cursor:"pointer",fontSize:16}}>×</button>}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  <div style={{marginBottom:0}}><div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:5}}>Konkurrent</div><select value={k.navn} onChange={function(e){upK(k.id,"navn",e.target.value);}} style={{width:"100%",padding:"9px 12px",borderRadius:5,border:"1px solid "+BRD,fontSize:13,fontFamily:"'DM Sans',sans-serif",color:TXT,background:SFC}}><option value="">— Vælg</option>{(customKonkurrenter||[]).map(function(kn){return <option key={kn} value={kn}>{kn}</option>;})}</select></div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>

//  KLASSE NOTE MODAL 
function ClassNoteModal({school,cohort,cls,classNotes,setClassNotes,onClose}){
  var existing=classNotes[cls.id]||{};
  var sn=useState(existing);var notes=sn[0];var setNotes=sn[1];
  var PRODS=["Studenterhue","Blåbog","Studieturstøj","Studenterkørsel"];
  var PROD_STATUS_OPTS=["Potentiel","Bekræftet interesse","Tilbud sendt","Tabt til konkurrent","Ikke relevant"];
  var PROD_COL2={"Potentiel":{c:MTD,bg:"#F0EDE8"},"Bekræftet interesse":{c:BLUE,bg:BLUEBG},"Tilbud sendt":{c:GOLD,bg:GOLDBG},"Tabt til konkurrent":{c:RED,bg:REDBG},"Ikke relevant":{c:MTD,bg:"#EEEBE6"}};
  function upProd(prod,field,val){setNotes(function(p){var cur=p[prod]||{};var up=Object.assign({},cur);up[field]=val;var r=Object.assign({},p);r[prod]=up;return r;});}
  function save(){setClassNotes(function(p){var r=Object.assign({},p);r[cls.id]=notes;return r;});onClose();}
  return(
    <Modal onClose={onClose} wide>
      <div style={{padding:"16px 22px",borderBottom:"1px solid "+BRD}}>
        <div style={{fontSize:16,fontWeight:700,color:TXT,fontFamily:"'Playfair Display',serif"}}>Klasse-noter · {cls.name}</div>
        <div style={{fontSize:12,color:MTD,marginTop:3}}>{school.name} · Årgang {cohort.year}</div>
      </div>
      <div style={{padding:"14px 22px",maxHeight:480,overflowY:"auto"}}>
        {PRODS.map(function(prod){
          var pn=notes[prod]||{};
          var st=pn.status||"";
          var col=st?PROD_COL2[st]:null;
          return(
            <div key={prod} style={{background:"#F8F6F2",borderRadius:8,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{fontSize:14,fontWeight:700,color:TXT,flex:1}}>{prod}</div>
                {col&&<Tag c={col.c} bg={col.bg} small>{st}</Tag>}
              </div>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:6}}>Status</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  <button onClick={function(){upProd(prod,"status","");}} style={{padding:"3px 10px",borderRadius:20,border:"1px solid "+(st===""?NAVY:BRD),background:st===""?NAVY:"transparent",color:st===""?"#fff":MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Ikke sat</button>
                  {PROD_STATUS_OPTS.map(function(opt){var c2=PROD_COL2[opt];return(
                    <button key={opt} onClick={function(){upProd(prod,"status",opt);}} style={{padding:"3px 10px",borderRadius:20,border:"1px solid "+(st===opt?c2.c:BRD),background:st===opt?c2.bg:"transparent",color:st===opt?c2.c:MTD,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{opt}</button>
                  );})}
                </div>
              </div>
              {st==="Tabt til konkurrent"&&(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:4}}>Konkurrent</div>
                    <input value={pn.konkurrent||""} onChange={function(e){upProd(prod,"konkurrent",e.target.value);}} placeholder="fx Hector" style={{width:"100%",padding:"7px 10px",borderRadius:5,border:"1px solid "+BRD,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:4}}>Kommentar</div>
                    <input value={pn.kommentar||""} onChange={function(e){upProd(prod,"kommentar",e.target.value);}} placeholder="Årsag…" style={{width:"100%",padding:"7px 10px",borderRadius:5,border:"1px solid "+BRD,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",boxSizing:"border-box"}}/>
                  </div>
                </div>
              )}
              {st&&st!=="Tabt til konkurrent"&&(
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:4}}>Note</div>
                  <input value={pn.kommentar||""} onChange={function(e){upProd(prod,"kommentar",e.target.value);}} placeholder="Tilføj note…" style={{width:"100%",padding:"7px 10px",borderRadius:5,border:"1px solid "+BRD,fontSize:12,fontFamily:"'DM Sans',sans-serif",color:TXT,outline:"none",boxSizing:"border-box"}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{padding:"12px 22px",borderTop:"1px solid "+BRD,display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={{padding:"8px 18px",borderRadius:5,border:"1px solid "+BRD,background:"transparent",color:MTD,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>Annuller</button>
        <button onClick={save} style={{padding:"8px 18px",borderRadius:5,border:"none",background:NAVY,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Gem</button>
      </div>
    </Modal>
  );
}

//  SKOLER 
function Skoler({user,schools,setSchools,assignments,pipeline,setPipeline,events,setEvents,prodStatus,setProdStatus,elever,setElever,templates,opgaver,setOpgaver,classNotes,setClassNotes,customFilters,setCustomFilters,customKonkurrenter,modeskabeloner,showArkiv,setShowArkiv,konkurrentProfiler,modeProfiler}){
  var st=useState("skoler");var tab=st[0];var setTab=st[1];
  var ss=useState(null);var sel=ss[0];var setSel=ss[1];
  var so=useState(null);var openCoh=so[0];var setOpenCoh=so[1];
  var sa=useState(false);var showArch=sa[0];var setShowArch=sa[1];
  var si=useState(null);var invCtx=si[0];var setInvCtx=si[1];
  var sne=useState(false);var noteEdit=sne[0];var setNoteEdit=sne[1];
  var snv=useState("");var noteVal=snv[0];var setNoteVal=snv[1];
  var sdet=useState(false);var detaljer=sdet[0];var setDetaljer=sdet[1];
  var sny=useState(false);var nyAargang=sny[0];var setNyAargang=sny[1];
  var spm=useState(null);var prodModal=spm[0];var setProdModal=spm[1];
  var sem=useState(null);var elevModal=sem[0];var setElevModal=sem[1];
  var shc=useState(null);var histCls=shc[0];var setHistCls=shc[1];
  var ssf=useState(null);var saelgerFilter=ssf[0];var setSaelgerFilter=ssf[1];
  var sclnm=useState(null);var clsNoteModal=sclnm[0];var setClsNoteModal=sclnm[1];
  var spf=useState(null);var pipeFilter=spf[0];var setPipeFilter=spf[1];
  var spm2=useState(false);var pipeModal=spm2[0];var setPipeModal=spm2[1];
  var spe=useState(null);var pipeEdit=spe[0];var setPipeEdit=spe[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];
  var scv=useState("liste");var calView=scv[0];var setCalView=scv[1];
  var snsk=useState(false);var nySkole=snsk[0];var setNySkole=snsk[1];
  var snkl=useState(null);var nyKlasse=snkl[0];var setNyKlasse=snkl[1];
  var srepr=useState(null);var reprDetalje=srepr[0];var setReprDetalje=srepr[1];
  var sop=useState(false);var opgaveModal=sop[0];var setOpgaveModal=sop[1];

  var canEdit=["admin","internsalg"].includes(user.role);
  var isAdmin=user.role==="admin";
  var canPipeline=["admin","internsalg","saelger"].includes(user.role);
  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null);},2200);}

  var mySchoolIds=null;
  if(user.role==="saelger"&&assignments){mySchoolIds=Object.keys(assignments).filter(function(k){return (assignments[k]||[]).includes(user.id);}).map(Number);}
  var baseSchools=mySchoolIds?schools.filter(function(s){return mySchoolIds.includes(s.id);}):schools;
  var filteredSchools=baseSchools.filter(function(s){if(!saelgerFilter)return true;if(saelgerFilter.type==="staff")return (assignments[s.id]||[]).includes(saelgerFilter.id);if(saelgerFilter.type==="custom"){var f=(customFilters||[]).find(function(ff){return ff.id===saelgerFilter.id;});return f?(f.schoolIds||[]).includes(s.id):true;}return true;});
  var school=null;if(sel){school=schools.find(function(s){return s.id===sel;})||null;}
  var cohs=[];if(school){cohs=showArch?school.cohorts:school.cohorts.filter(function(c){return c.status==="active";});}
  var calEvents=sel?events.filter(function(e){return e.schoolId===sel||e.schoolId===0;}):events;
  var myPipeline=user.role==="saelger"?pipeline.filter(function(p){return p.responsible===user.id;}):pipeline;
  var aktivPipeline=myPipeline.filter(function(p){return showArkiv?p.status==="Løst":p.status!=="Løst";});
  var filtPipeline=aktivPipeline;
  if(pipeFilter&&pipeFilter.type==="staff"){filtPipeline=aktivPipeline.filter(function(p){return p.responsible===pipeFilter.id;});}

  function updateSchool(sid,patch){setSchools(function(p){return p.map(function(s){return s.id===sid?Object.assign({},s,patch):s;});});}
  function saveNote(){updateSchool(school.id,{note:noteVal});setNoteEdit(false);showToast("Note gemt");}
  function addCohort(yr,classNames,prods){var allCoIds=[];schools.forEach(function(s){s.cohorts.forEach(function(c){allCoIds.push(c.id);});});var maxId=Math.max.apply(null,allCoIds.concat([400]))+1;var allClIds=[];schools.forEach(function(s){s.cohorts.forEach(function(c){c.classes.forEach(function(c2){allClIds.push(c2.id);});});});var maxClsId=Math.max.apply(null,allClIds.concat([9000]))+1;var newCohort={id:maxId,year:yr,status:"active",classes:classNames.map(function(name,i){return {id:maxClsId+i,name:name,students:0,repr1:null,repr2:null,products:prods,orders:0,rev:0};})};updateSchool(school.id,{cohorts:[newCohort].concat(school.cohorts)});setOpenCoh(maxId);showToast("Nyårgang oprettet");}
  function addKlasseToCohort(cohortId,classData){updateSchool(school.id,{cohorts:school.cohorts.map(function(c){return c.id===cohortId?Object.assign({},c,{classes:c.classes.concat([classData])}):c;})});showToast("Klasse tilføjet");}
  function addSchool(data){setSchools(function(p){return p.concat([data]);});showToast("Skole oprettet");}
  function removeProduct(schoolId,cohortId,classId,prod){setSchools(function(p){return p.map(function(s){if(s.id!==schoolId)return s;return Object.assign({},s,{cohorts:s.cohorts.map(function(c){if(c.id!==cohortId)return c;return Object.assign({},c,{classes:c.classes.map(function(cl){if(cl.id!==classId)return cl;return Object.assign({},cl,{products:(cl.products||[]).filter(function(px){return px!==prod;})});})});})});});});showToast("Produkt fjernet");}
  function removeRepr(schoolId,cohortId,classId,slot){setSchools(function(p){return p.map(function(s){if(s.id!==schoolId)return s;return Object.assign({},s,{cohorts:s.cohorts.map(function(c){if(c.id!==cohortId)return c;return Object.assign({},c,{classes:c.classes.map(function(cl){if(cl.id!==classId)return cl;var patch={};patch["repr"+slot]=null;return Object.assign({},cl,patch);})})})});})});showToast("Repræsentant fjernet");}
  function savePipeline(data){if(pipeEdit){setPipeline(function(p){return p.map(function(x){return x.id===pipeEdit.id?Object.assign({},x,data):x;});});showToast("Emne opdateret");}else{setPipeline(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Emne oprettet");}setPipeModal(false);setPipeEdit(null);}
  function delPipeline(id){setPipeline(function(p){return p.filter(function(x){return x.id!==id;});});showToast("Emne slettet");}
  function addOpgave(data){setOpgaver(function(p){return p.concat([Object.assign({id:Date.now()},data)]);});showToast("Opgave oprettet");}

  var TABS_ITEMS=[{key:"skoler",label:"Skoler"},{key:"kalender",label:"Kalender"+(sel&&school?" "+school.name.split(" ")[0]:"")}].concat(canPipeline?[{key:"pipeline",label:"Pipeline ("+filtPipeline.length+")"}]:[]);

  function getHistory(cls){return school?school.cohorts.map(function(co){var m=co.classes.find(function(c){return c.name===cls.name;});return m?Object.assign({year:co.year,status:co.status},m):null;}).filter(Boolean).sort(function(a,b){return b.year-a.year;}).slice(1):[];}

  var today=new Date("2026-03-10");
  function daysTo(dateStr){if(!dateStr)return 999;var d=new Date(dateStr);return Math.ceil((d-today)/(1000*60*60*24));}


  return(
    <div style={{padding:"28px 28px 40px",maxWidth:1100,margin:"0 auto"}}>
      {toast&&<Toast msg={toast}/>}
      {invCtx&&<InviteModal ctx={invCtx} onClose={function(){setInvCtx(null);}} templates={templates}/>}
      
      {clsNoteModal&&<ClassNoteModal school={clsNoteModal.school} cohort={clsNoteModal.cohort} cls={clsNoteModal.cls} classNotes={classNotes} setClassNotes={setClassNotes} onClose={function(){setClsNoteModal(null);}}/>}
      {nyAargang&&school&&<NyAargangModal school={school} onSave={addCohort} onClose={function(){setNyAargang(false);}}/>}
      {nySkole&&<NySkoleModal onSave={addSchool} onClose={function(){setNySkole(false);}}/>}

//  TRADITIONER 
function Traditioner({user,schools,setSchools,assignments,customFilters,setCustomFilters,customKonkurrenter,modeskabeloner}){
  var canEdit=["admin","saelger","internsalg"].includes(user.role);
  var stf=useState(null);var tradFilter=stf[0];var setTradFilter=stf[1];
  var sel=useState(null);var selSchool=sel[0];var setSelSchool=sel[1];
  var selCo=useState(null);var selCohort=selCo[0];var setSelCohort=selCo[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];
  function showToast(m){setToast(m);setTimeout(function(){setToast(null);},2000);}

  var tradSchools=tradFilter?(tradFilter.type==="staff"?schools.filter(function(s){return (assignments[s.id]||[]).includes(tradFilter.id);}):schools.filter(function(s){var f=(customFilters||[]).find(function(ff){return ff.id===tradFilter.id;});return f?(f.schoolIds||[]).includes(s.id):true;})):schools;

  function saveCohortTrad(schoolId,cohortId,upd){
    setSchools(function(p){return p.map(function(s){
      if(s.id!==schoolId)return s;
      return Object.assign({},s,{cohorts:s.cohorts.map(function(co){return co.id===cohortId?Object.assign({},co,upd):co;})});
    });});
    showToast("Gemt");
  }

  var school=selSchool?schools.find(function(s){return s.id===selSchool;}):null;
  var cohort=school&&selCohort?school.cohorts.find(function(co){return co.id===selCohort;}):null;

  return(
    <div style={{padding:"28px 28px 40px",maxWidth:1100,margin:"0 auto"}}>
      {toast&&<Toast msg={toast}/>}
      <h1 style={{fontSize:22,fontWeight:700,color:TXT,margin:"0 0 16px",fontFamily:"'Playfair Display',serif"}}>Traditioner</h1>
      <SaelgerFilter value={tradFilter} onChange={setTradFilter} customFilters={customFilters} setCustomFilters={setCustomFilters} schools={schools}/>
      <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:18,marginTop:12}}>
        {/* School + cohort selector */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:MTD,textTransform:"uppercase",letterSpacing:.7,marginBottom:8}}>Skoler</div>
          {tradSchools.map(function(s){
            var trd=s.trad||{};
            var kat=trd.kategori;
            var activeCohorts=s.cohorts.filter(function(co){return co.status==="active";});
            return(
              <div key={s.id} style={{marginBottom:6}}>
                <button onClick={function(){setSelSchool(selSchool===s.id?null:s.id);setSelCohort(null);}} style={{width:"100%",textAlign:"left",padding:"9px 12px",borderRadius:8,border:"1px solid "+(selSchool===s.id?NAVY:BRD),background:selSchool===s.id?"#F0EEE8":"transparent",cursor:"pointer",fontFamily:"inherit"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:13,fontWeight:700,color:TXT,flex:1}}>{s.name.split(" ")[0]}</span>
                    {kat&&<Tag small c={KAT_COL[kat].c} bg={KAT_COL[kat].bg}>{kat}</Tag>}
                  </div>
                  <div style={{fontSize:11,color:MTD,marginTop:2}}>{s.city}</div>
                </button>
                {selSchool===s.id&&activeCohorts.map(function(co){return(
                  <button key={co.id} onClick={function(){setSelCohort(co.id);}} style={{width:"100%",textAlign:"left",padding:"7px 12px 7px 20px",borderRadius:6,border:"1px solid "+(selCohort===co.id?GOLD:BRD),background:selCohort===co.id?GOLDBG:"transparent",cursor:"pointer",fontFamily:"inherit",marginTop:3,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12,fontWeight:600,color:TXT}}>Årgang {co.year}</span>
                    {(function(){var ct=co.contract;if(!ct)return null;var cs=ct.status||"Tilbud sendt";var cc=cs==="Tilbud godkendt"?{c:GREEN,bg:GBGN}:{c:GOLD,bg:GOLDBG};return <Tag small c={cc.c} bg={cc.bg}>{cs}</Tag>;})()}
                  </button>
                );})}
              </div>
            );
          })}
        </div>

        {/* Right panel */}
        <div>
          {!selSchool&&<div style={{padding:"60px 20px",textAlign:"center",color:MTD,fontSize:13}}>Vælg en skole til venstre</div>}
          {selSchool&&!selCohort&&school&&<div style={{padding:"40px 20px",textAlign:"center",color:MTD,fontSize:13}}>
            <div style={{fontSize:32,marginBottom:10}}>📅</div>
            <div style={{fontWeight:600,color:TXT,marginBottom:4}}>{school.name}</div>
            <div>Vælg en årgang for at se og redigere traditioner, kontrakt og konkurrenter</div>
          </div>}
          {selSchool&&selCohort&&school&&cohort&&(
            <CohortDetailModal school={school} cohort={cohort} canEdit={canEdit} customKonkurrenter={customKonkurrenter||[]} modeskabeloner={modeskabeloner||[]} onSave={function(upd){saveCohortTrad(school.id,cohort.id,upd);}} onClose={function(){}} inline={true}/>
          )}
        </div>
      </div>
    </div>
  );
}

function Statistik({user,schools,setSchools,customFilters,setCustomFilters}){
  var canEdit=["admin","internsalg"].includes(user.role);
  var allCls=[];schools.forEach(function(s){s.cohorts.filter(function(c){return c.status==="active";}).forEach(function(c){c.classes.forEach(function(cl){allCls.push(Object.assign({schoolId:s.id,schoolName:s.name,cohortYear:cl.year||2026},cl));});});});
  var totalRev=allCls.reduce(function(a,c){return a+c.rev;},0);
  var totalOrd=allCls.reduce(function(a,c){return a+c.orders;},0);
  var se=useState(null);var editCell=se[0];var setEditCell=se[1]; // {schoolId,cohortId,classId,field}
  var sv=useState("");var editVal=sv[0];var setEditVal=sv[1];
  var ssf=useState(null);var selSchool=ssf[0];var setSelSchool=ssf[1];
  var stoast=useState(null);var toast=stoast[0];var setToast=stoast[1];
  function showToast(m){setToast(m);setTimeout(function(){setToast(null);},2000);}

  function startEdit(schoolId,cohortId,classId,field,cur){
    if(!canEdit)return;
    setEditCell({schoolId:schoolId,cohortId:cohortId,classId:classId,field:field});
    setEditVal(String(cur));
  }
  function saveEdit(){if(!editCell)return;var numVal=parseInt(editVal)||0;setSchools(function(p){return p.map(function(s){if(s.id!==editCell.schoolId)return s;return Object.assign({},s,{cohorts:s.cohorts.map(function(co){if(co.id!==editCell.cohortId)return co;return Object.assign({},co,{classes:co.classes.map(function(cl){if(cl.id!==editCell.classId)return cl;var patch={};patch[editCell.field]=numVal;return Object.assign({},cl,patch);})});})});});});setEditCell(null);showToast("Opdateret");}

  var filtCls=selSchool?allCls.filter(function(c){return c.schoolId===selSchool;}):allCls;
  var maxRev=Math.max.apply(null,filtCls.map(function(c){return c.rev;}).concat([1]));

  return(
    <div style={{padding:"28px 28px 40px",maxWidth:1060,margin:"0 auto"}}>
      {toast&&<Toast msg={toast}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:700,color:TXT,margin:0,fontFamily:"'Playfair Display',serif"}}>Statistik</h1>
        {canEdit&&<div style={{fontSize:12,color:MTD,background:GOLDBG,border:"1px solid "+GOLD+"40",borderRadius:6,padding:"5px 12px"}}>✏️ Klik på tal for at redigere</div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
        <KPI label="Total omsætning" value={kr(totalRev)} delta={+pct(totalRev,MG.ly.rev)} icon="kr"/>
        <KPI label="Ordrer" value={totalOrd} delta={+pct(totalOrd,MG.ly.orders)} icon="📦"/>
        <KPI label="Aktive skoler" value={schools.length} icon="🏫"/>
        <KPI label="Gns. ordre" value={totalOrd>0?kr(Math.round(totalRev/totalOrd)):"—"} icon="↗"/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:16,marginBottom:20}}>
        <Card><STitle sub="Mørk = 2026 · Lys = 2025">Månedlig omsætning</STitle><BarChart data={MG.mo}/></Card>
        <Card><STitle>Pr. skole</STitle>
          {schools.map(function(s){
            var rev=s.cohorts.filter(function(c){return c.status==="active";}).reduce(function(a,c){return a+c.classes.reduce(function(b,cl){return b+cl.rev;},0);},0);
            return <div key={s.id} onClick={function(){setSelSchool(selSchool===s.id?null:s.id);}} style={{marginBottom:12,cursor:"pointer",padding:"4px 6px",borderRadius:5,background:selSchool===s.id?"#F0EDE8":"transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:TXT,fontWeight:selSchool===s.id?700:400}}>{s.name.split(" ")[0]}</span><span style={{fontSize:13,fontWeight:700,color:GOLD}}>{kr(rev)}</span></div>
              <Prog val={rev} max={250000}/>
            </div>;
          })}
          {selSchool&&<button onClick={function(){setSelSchool(null);}} style={{fontSize:11,color:MTD,background:"none",border:"none",cursor:"pointer",padding:"4px 0",fontFamily:"inherit"}}>Vis alle</button>}
        </Card>
      </div>

      {/* Klasse-tabel  redigerbar */}
      <Card noPad>
        <div style={{padding:"14px 20px",borderBottom:"1px solid "+BRD,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:TXT,fontFamily:"'Playfair Display',serif"}}>
            {selSchool?(schools.find(function(s){return s.id===selSchool;})||{name:"Alle klasser"}).name:"Alle klasser"}
          </div>
          <div style={{fontSize:12,color:MTD}}>{filtCls.length} klasser · {kr(filtCls.reduce(function(a,c){return a+c.rev;},0))}</div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:"#F8F6F2"}}>
              <th style={{padding:"9px 14px",textAlign:"left",fontWeight:700,color:MTD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Skole</th>
              <th style={{padding:"9px 10px",textAlign:"left",fontWeight:700,color:MTD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Klasse</th>
              <th style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:MTD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Elever</th>
              <th style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:MTD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Ordrer</th>
              <th style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:GOLD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Omsætning</th>
              <th style={{padding:"9px 10px",fontWeight:700,color:MTD,fontSize:11,textTransform:"uppercase",letterSpacing:.7}}>Andel</th>
            </tr></thead>
            <tbody>
              {filtCls.map(function(cls){
                var school=schools.find(function(s){return s.id===cls.schoolId;});
                var cohort=school&&school.cohorts.find(function(co){return co.classes.find(function(c){return c.id===cls.id;});});
                var isEditRev=editCell&&editCell.classId===cls.id&&editCell.field==="rev";
                var isEditOrd=editCell&&editCell.classId===cls.id&&editCell.field==="orders";
                var isEditStu=editCell&&editCell.classId===cls.id&&editCell.field==="students";
                return(
                  <tr key={cls.id} style={{borderTop:"1px solid "+BRD,background:cls.rev>0?SFC:"#FAFAF8"}}>
                    <td style={{padding:"9px 14px",color:MTD,fontSize:12}}>{cls.schoolName.split(" ")[0]}</td>
                    <td style={{padding:"9px 10px",fontWeight:700,color:TXT}}>{cls.name}</td>
                    <td style={{padding:"9px 10px",textAlign:"center"}}>
                      {isEditStu?(
                        <input autoFocus value={editVal} onChange={function(e){setEditVal(e.target.value);}} onBlur={saveEdit} onKeyDown={function(e){if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditCell(null);}} style={{width:60,textAlign:"center",padding:"3px 6px",borderRadius:4,border:"1px solid "+NAVY,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                      ):(
                        <span onClick={function(){school&&cohort&&startEdit(school.id,cohort.id,cls.id,"students",cls.students);}} style={{color:MTD,cursor:canEdit?"pointer":"default",padding:"3px 8px",borderRadius:4,display:"inline-block"}} onMouseEnter={function(e){if(canEdit)e.target.style.background="#F0EDE8";}} onMouseLeave={function(e){e.target.style.background="transparent";}}>{cls.students}{canEdit&&" ✎"}</span>
                      )}
                    </td>
                    <td style={{padding:"9px 10px",textAlign:"center"}}>
                      {isEditOrd?(
                        <input autoFocus value={editVal} onChange={function(e){setEditVal(e.target.value);}} onBlur={saveEdit} onKeyDown={function(e){if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditCell(null);}} style={{width:60,textAlign:"center",padding:"3px 6px",borderRadius:4,border:"1px solid "+NAVY,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                      ):(
                        <span onClick={function(){school&&cohort&&startEdit(school.id,cohort.id,cls.id,"orders",cls.orders);}} style={{color:MTD,cursor:canEdit?"pointer":"default",padding:"3px 8px",borderRadius:4,display:"inline-block"}} onMouseEnter={function(e){if(canEdit)e.target.style.background="#F0EDE8";}} onMouseLeave={function(e){e.target.style.background="transparent";}}>{cls.orders}{canEdit&&" ✎"}</span>
                      )}
                    </td>
                    <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:cls.rev>0?GOLD:MTD}}>
                      {isEditRev?(
                        <input autoFocus value={editVal} onChange={function(e){setEditVal(e.target.value);}} onBlur={saveEdit} onKeyDown={function(e){if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditCell(null);}} style={{width:90,textAlign:"right",padding:"3px 8px",borderRadius:4,border:"1px solid "+NAVY,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
                      ):(
                        <span onClick={function(){school&&cohort&&startEdit(school.id,cohort.id,cls.id,"rev",cls.rev);}} style={{cursor:canEdit?"pointer":"default",padding:"3px 8px",borderRadius:4,display:"inline-block"}} onMouseEnter={function(e){if(canEdit)e.target.style.background="#F0EDE8";}} onMouseLeave={function(e){e.target.style.background="transparent";}}>{cls.rev>0?kr(cls.rev):"—"}{canEdit&&cls.rev>0?" ✎":""}</span>
                      )}
                    </td>
                    <td style={{padding:"9px 10px",minWidth:100}}>
                      {cls.rev>0&&<Prog val={cls.rev} max={maxRev} color={GOLD}/>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr style={{borderTop:"2px solid "+BRD,background:"#F8F6F2"}}>
              <td colSpan={4} style={{padding:"9px 14px",fontWeight:700,color:TXT,fontSize:13}}>Total</td>
              <td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:GOLD,fontSize:14}}>{kr(filtCls.reduce(function(a,c){return a+c.rev;},0))}</td>
              <td/>
            </tr></tfoot>
          </table>
        </div>
      </Card>
    </div>
  );
}

    <div>

  var smtp=useState([{id:"Studenterhue-møde",navn:"Studenterhue-møde",formal:"",forberedelse:"",typiskVarighed:"60",hvemDeltager:"Sælger + klasserepræsentanter",tjekliste:"",noter:""},{id:"Blåbog-møde",navn:"Blåbog-møde",formal:"",forberedelse:"",typiskVarighed:"45",hvemDeltager:"",tjekliste:"",noter:""},{id:"Studieturstøj-møde",navn:"Studieturstøj-møde",formal:"",forberedelse:"",typiskVarighed:"45",hvemDeltager:"",tjekliste:"",noter:""},{id:"Opfølgning",navn:"Opfølgning",formal:"",forberedelse:"",typiskVarighed:"30",hvemDeltager:"",tjekliste:"",noter:""},{id:"Aftalemøde",navn:"Aftalemøde",formal:"",forberedelse:"",typiskVarighed:"60",hvemDeltager:"",tjekliste:"",noter:""}]);var modeProfiler=smtp[0];var setModeProfiler=smtp[1];
  var spa=useState(false);var showArkiv=spa[0];var setShowArkiv=spa[1];

  useEffect(function(){
    function h(e){if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setShowSearch(true);}}
    window.addEventListener("keydown",h);
    return function(){window.removeEventListener("keydown",h);};
  },[]);

  if(!user)return <Login onLogin={function(u){setUser(u);setPage("dashboard");}}/>;

  var notifCount=0;
  var sagCount=sager.filter(function(s){return s.status==="Ny";}).length;
  var opgCount=opgaver.filter(function(o){return o.status!=="Udført"&&(user.role==="admin"||o.to===user.id);}).length;

  function go(pg){setPage(pg);}

  var mainStyle={flex:1,minWidth:0,background:BG,overflowY:"auto",minHeight:"100vh"};

  return(
    <div style={{display:"flex",minHeight:"100vh",background:BG,fontFamily:"'DM Sans',sans-serif"}}>
      <link rel="preconnect" href="https://fonts.googleapis.com"/>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      {showSearch&&<GlobalSearch schools={schools} onNavigate={go} onClose={function(){setShowSearch(false);}}/>}
      <Sidebar user={user} page={page} go={go} logout={function(){setUser(null);}} notifCount={notifCount} sagCount={sagCount} opgaveCount={opgCount}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <Topbar page={page} user={user} onSearch={function(){setShowSearch(true);}} notifCount={notifCount} sagCount={sagCount}/>
        <div style={mainStyle}>
          {page==="dashboard"&&<Dashboard user={user} schools={schools} events={events} opgaver={opgaver}/>}
          {page==="skoler"&&<Skoler user={user} schools={schools} setSchools={setSchools} assignments={assignments} pipeline={pipeline} setPipeline={setPipeline} events={events} setEvents={setEvents} prodStatus={prodStatus} setProdStatus={setProdStatus} elever={elever} setElever={setElever} templates={templates} opgaver={opgaver} setOpgaver={setOpgaver} classNotes={classNotes} setClassNotes={setClassNotes} customFilters={customFilters} setCustomFilters={setCustomFilters} customKonkurrenter={customKonkurrenter} modeskabeloner={modeskabeloner} showArkiv={showArkiv} setShowArkiv={setShowArkiv} konkurrentProfiler={konkurrentProfiler} modeProfiler={modeProfiler}/>}
          {page==="traditioner"&&<Traditioner user={user} schools={schools} setSchools={setSchools} assignments={assignments} customFilters={customFilters} setCustomFilters={setCustomFilters} customKonkurrenter={customKonkurrenter} modeskabeloner={modeskabeloner}/>}
          {page==="kommunikation"&&<Kommunikation user={user} schools={schools} assignments={assignments} customFilters={customFilters} setCustomFilters={setCustomFilters} opgaver={opgaver} setOpgaver={setOpgaver} sager={sager} setSager={setSager}/>}
          {page==="statistik"&&<Statistik user={user} schools={schools} setSchools={setSchools} customFilters={customFilters} setCustomFilters={setCustomFilters}/>}
          {page==="indstillinger"&&<Indstillinger schools={schools} assignments={assignments} setAssignments={setAssignments} templates={templates} setTemplates={setTemplates} opgaver={opgaver} setOpgaver={setOpgaver} customKonkurrenter={customKonkurrenter} setCustomKonkurrenter={setCustomKonkurrenter} modeskabeloner={modeskabeloner} setModeskabeloner={setModeskabeloner} konkurrentProfiler={konkurrentProfiler} setKonkurrentProfiler={setKonkurrentProfiler} modeProfiler={modeProfiler} setModeProfiler={setModeProfiler}/>}
          {page==="minskole"&&<MinSkole user={user} schools={schools} events={events} elever={elever} setElever={setElever} prodStatus={prodStatus} setProdStatus={setProdStatus}/>}
          {page==="guides"&&<Guides user={user}/>}
        </div>
      </div>
    </div>
  );
}
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App,null));
</script></body></html>
