// ─── RUNTIME HELPERS: læs custom roller fra localStorage ─────────────────────
function getCustomRoles() {
    try {
        var r = localStorage.getItem("cls_custom_roles");
        return r ? JSON.parse(r) : null;
    } catch(e) { return null; }
}

function getRolePerms(roleKey) {
    var custom = getCustomRoles();
    if (custom) {
        var found = custom.find(function(r){ return r.key === roleKey; });
        if (found) return found.permissions || [];
    }
    return DEFAULT_ROLE_PERMS[roleKey] || [];
}

function getRolePages(roleKey) {
    var custom = getCustomRoles();
    if (custom) {
        var found = custom.find(function(r){ return r.key === roleKey; });
        if (found) return found.pages || [];
    }
    return DEFAULT_ROLE_PAGES[roleKey] || [];
}

var ROLE_PERMS = DEFAULT_ROLE_PERMS;

function can(user, perm) {
    if (!user) return false;
    return getRolePerms(user.role).includes(perm);
